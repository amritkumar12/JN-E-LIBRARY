<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Assistant | Gemini AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0f172a;
            color: #f1f5f9;
            margin: 0;
            overflow: hidden;
        }

        .chat-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            max-width: 1200px;
            margin: 0 auto;
            border-left: 1px solid #1e293b;
            border-right: 1px solid #1e293b;
            background: #020617;
        }

        .message-bot {
            background: #1e293b;
            border-radius: 1.25rem 1.25rem 1.25rem 0.25rem;
            color: #e2e8f0;
        }

        .message-user {
            background: #3b82f6;
            border-radius: 1.25rem 1.25rem 0.25rem 1.25rem;
            color: white;
        }

        .typing-indicator span {
            height: 6px;
            width: 6px;
            background: #94a3b8;
            display: inline-block;
            border-radius: 50%;
            margin: 0 2px;
            animation: bounce 1.3s infinite;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.15s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.3s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-4px); }
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [messages, setMessages] = useState([
                { role: 'bot', text: "Hello students! I am ready to answer every question in your mind. Whether it's about science, history, coding, or just seeking advice, feel free to ask anything!" }
            ]);
            const [input, setInput] = useState("");
            const [isTyping, setIsTyping] = useState(false);
            const messagesEndRef = useRef(null);

            const scrollToBottom = () => {
                messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
            };

            useEffect(() => {
                scrollToBottom();
            }, [messages, isTyping]);

            const callGemini = async (userPrompt) => {
                const apiKey = ""; // API Key provided by environment
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                
                // Broad system instruction for an all-purpose assistant
                const systemPrompt = `You are a brilliant and versatile Academic AI Assistant. 
                Your goal is to help students with ANY question they have—academic, general knowledge, creative, or technical.
                - Provide detailed, accurate, and encouraging answers.
                - If the question is about library books, you can still mention categories like Engineering, Literature, History, BSC, and Self Help.
                - Use clear formatting for lists or steps.
                - Do not limit yourself to book suggestions; be a full educational resource.`;

                const payload = {
                    contents: [{ parts: [{ text: userPrompt }] }],
                    systemInstruction: { parts: [{ text: systemPrompt }] }
                };

                const fetchWithRetry = async (retries = 5, delay = 1000) => {
                    try {
                        const response = await fetch(url, {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify(payload)
                        });

                        if (!response.ok) throw new Error(`HTTP ${response.status}`);
                        
                        const data = await response.json();
                        return data.candidates?.[0]?.content?.parts?.[0]?.text;
                    } catch (err) {
                        if (retries > 0) {
                            await new Promise(res => setTimeout(res, delay));
                            return fetchWithRetry(retries - 1, delay * 2);
                        }
                        throw err;
                    }
                };

                return await fetchWithRetry();
            };

            const handleSend = async () => {
                if (!input.trim() || isTyping) return;

                const userText = input.trim();
                setMessages(prev => [...prev, { role: 'user', text: userText }]);
                setInput("");
                setIsTyping(true);

                try {
                    const botResponse = await callGemini(userText);
                    setMessages(prev => [...prev, { role: 'bot', text: botResponse || "I couldn't generate an answer. Please try rephrasing." }]);
                } catch (error) {
                    setMessages(prev => [...prev, { role: 'bot', text: "Connection error. Please check your internet or try again later." }]);
                } finally {
                    setIsTyping(false);
                }
            };

            const goBack = () => {
                // In a real app, this might navigate routes. 
                // Here we'll simulate a reset or just a UI feedback.
                if (window.confirm("Do you want to reset the conversation?")) {
                    setMessages([{ role: 'bot', text: "Hello students! I am ready to answer every question in your mind." }]);
                }
            };

            return (
                <div className="chat-container">
                    {/* Header */}
                    <header className="p-4 border-b border-slate-800 bg-slate-900/80 backdrop-blur-sm flex items-center justify-between sticky top-0 z-10">
                        <div className="flex items-center gap-4">
                            <button 
                                onClick={goBack}
                                className="p-2 hover:bg-slate-700 rounded-lg transition-colors text-slate-400 hover:text-white"
                                title="Back"
                            >
                                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                                </svg>
                            </button>
                            <div className="flex items-center gap-3 border-l border-slate-700 pl-4">
                                <div className="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center font-bold text-xs">AI</div>
                                <div>
                                    <h1 className="font-semibold text-sm">Academic Assistant</h1>
                                    <div className="flex items-center gap-1.5">
                                        <div className="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></div>
                                        <span className="text-[10px] text-slate-400 uppercase font-bold tracking-widest">Active Now</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* Messages Area */}
                    <div className="flex-1 overflow-y-auto p-6 space-y-6">
                        {messages.map((msg, i) => (
                            <div key={i} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                <div className={`max-w-[85%] p-4 text-sm shadow-lg ${msg.role === 'user' ? 'message-user' : 'message-bot'}`}>
                                    <div className="whitespace-pre-wrap">{msg.text}</div>
                                </div>
                            </div>
                        ))}
                        {isTyping && (
                            <div className="flex justify-start">
                                <div className="message-bot p-4 shadow-lg">
                                    <div className="typing-indicator">
                                        <span></span><span></span><span></span>
                                    </div>
                                </div>
                            </div>
                        )}
                        <div ref={messagesEndRef} />
                    </div>

                    {/* Input Area */}
                    <div className="p-6 bg-slate-900/50 border-t border-slate-800">
                        <div className="relative group">
                            <input 
                                type="text" 
                                value={input}
                                onChange={(e) => setInput(e.target.value)}
                                onKeyDown={(e) => e.key === 'Enter' && handleSend()}
                                placeholder="Ask me anything..."
                                className="w-full bg-slate-800 border border-slate-700 rounded-2xl py-4 pl-6 pr-14 text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all shadow-inner"
                            />
                            <button 
                                onClick={handleSend}
                                disabled={isTyping || !input.trim()}
                                className="absolute right-2 top-1/2 -translate-y-1/2 p-2.5 bg-blue-600 hover:bg-blue-500 rounded-xl text-white transition-all disabled:opacity-30 disabled:cursor-not-allowed group-focus-within:scale-105"
                            >
                                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 10l7-7m0 0l7 7m-7-7v18" />
                                </svg>
                            </button>
                        </div>
                        <div className="mt-3 flex justify-center gap-4">
                            <span className="text-[9px] text-slate-500 uppercase tracking-widest font-bold">Smart Analysis</span>
                            <span className="text-[9px] text-slate-500 uppercase tracking-widest font-bold">Academic Support</span>
                            <span className="text-[9px] text-slate-500 uppercase tracking-widest font-bold">24/7 Access</span>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

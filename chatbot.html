<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScholarBot AI - All-in-One Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }

        .chat-container {
            height: calc(100vh - 200px);
        }

        .message-bubble {
            max-width: 85%;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body class="text-slate-900">

    <div class="max-w-5xl mx-auto px-4 py-6 h-screen flex flex-col">
        <!-- Header -->
        <header class="flex items-center justify-between mb-6">
            <div class="flex items-center gap-4">
                <!-- Back Button -->
               <a href="index.html"> <button onclick="goBack()" class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-slate-200 text-slate-600 transition-all" title="Go Back">
                    <i class="fas fa-arrow-left"></i>
                </button></a>

                <div class="flex items-center gap-3 border-l pl-4 border-slate-200">
                    <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-blue-200">
                        <i class="fas fa-graduation-cap text-xl"></i>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold text-slate-800">ScholarBot</h1>
                        <p class="text-xs text-slate-500 font-medium uppercase tracking-wider">Academic AI Assistant</p>
                    </div>
                </div>
            </div>
            
            <div class="flex gap-2">
                <button onclick="clearChat()" class="p-2 text-slate-400 hover:text-red-500 transition-colors" title="Clear Chat">
                    <i class="fas fa-trash-alt"></i>
                </button>
            </div>
        </header>

        <!-- Main Chat Area -->
        <main class="flex-1 glass-panel rounded-3xl shadow-xl overflow-hidden flex flex-col mb-4">
            <div id="chat-window" class="flex-1 overflow-y-auto p-4 space-y-6 chat-container">
                <!-- Welcome Message / Home View -->
                <div class="flex flex-col items-center justify-center h-full text-center p-8 space-y-4 text-slate-400" id="empty-state">
                    <div class="w-16 h-16 bg-slate-100 rounded-full flex items-center justify-center mb-2">
                        <i class="fas fa-robot text-3xl"></i>
                    </div>
                    <h2 class="text-xl font-semibold text-slate-700">How can I help you today?</h2>
                    <p class="max-w-xs text-sm">Ask me to write an essay, solve a math problem, or generate an image for your project.</p>
                    <div class="grid grid-cols-2 gap-2 mt-4">
                        <button onclick="setPrompt('Explain Quantum Physics simply')" class="text-xs bg-white border border-slate-200 px-3 py-2 rounded-lg hover:bg-slate-50 transition-colors">"Explain Quantum..."</button>
                        <button onclick="setPrompt('Generate a landscape of a futuristic library')" class="text-xs bg-white border border-slate-200 px-3 py-2 rounded-lg hover:bg-slate-50 transition-colors">"Generate Image..."</button>
                    </div>
                </div>
                <!-- Chat messages will be appended here -->
                <div id="message-list" class="space-y-6"></div>
            </div>

            <!-- Loading Indicator -->
            <div id="loading" class="hidden px-6 py-4 flex items-center gap-3 text-sm text-blue-600 font-medium bg-blue-50/50">
                <div class="loader"></div>
                <span>ScholarBot is thinking...</span>
            </div>

            <!-- Input Area -->
            <div class="p-4 border-t border-slate-100 bg-white/50">
                <div class="relative flex items-end gap-2">
                    <textarea 
                        id="user-input" 
                        rows="1" 
                        placeholder="Message ScholarBot..." 
                        class="w-full bg-white border border-slate-200 rounded-2xl py-3 px-4 pr-12 focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all resize-none max-h-40"
                        oninput="this.style.height = ''; this.style.height = this.scrollHeight + 'px'"
                    ></textarea>
                    <button 
                        id="send-btn" 
                        onclick="handleSendMessage()"
                        class="bg-blue-600 hover:bg-blue-700 text-white w-12 h-12 rounded-xl flex items-center justify-center shadow-lg shadow-blue-200 transition-all active:scale-95"
                    >
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
                <p class="text-[10px] text-center text-slate-400 mt-2">
                    ScholarBot can make mistakes. Verify important information.
                </p>
            </div>
        </main>
    </div>

    <script>
        const apiKey = ""; // Provided by environment
        const chatWindow = document.getElementById('chat-window');
        const messageList = document.getElementById('message-list');
        const userInput = document.getElementById('user-input');
        const loadingIndicator = document.getElementById('loading');
        const emptyState = document.getElementById('empty-state');

        // Automatic focus on load
        window.onload = () => userInput.focus();

        /**
         * Navigation: Go Back
         * Returns the user to the "Home" state by clearing messages and showing the welcome screen.
         */
        function goBack() {
            if (messageList.children.length > 0) {
                // If there are messages, we clear them to go "back" to start
                clearChat();
            } else {
                // Otherwise, perhaps a simple UI notification
                console.log("Already at the home screen.");
            }
        }

        function setPrompt(text) {
            userInput.value = text;
            userInput.style.height = userInput.scrollHeight + 'px';
            handleSendMessage();
        }

        function clearChat() {
            messageList.innerHTML = '';
            emptyState.classList.remove('hidden');
            chatWindow.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function handleSendMessage() {
            const prompt = userInput.value.trim();
            if (!prompt) return;

            // Update UI
            if (!emptyState.classList.contains('hidden')) {
                emptyState.classList.add('hidden');
            }
            
            appendMessage('user', prompt);
            userInput.value = '';
            userInput.style.height = 'auto';
            loadingIndicator.classList.remove('hidden');
            chatWindow.scrollTo({ top: chatWindow.scrollHeight, behavior: 'smooth' });

            try {
                // Logic: Check for image intent
                const isImageRequest = prompt.toLowerCase().includes('generate') || 
                                       prompt.toLowerCase().includes('create a picture') || 
                                       prompt.toLowerCase().includes('draw a') ||
                                       prompt.toLowerCase().includes('image of');

                if (isImageRequest) {
                    await generateImage(prompt);
                } else {
                    await generateText(prompt);
                }
            } catch (error) {
                appendMessage('bot', 'Sorry, I encountered an error. Please check your connection and try again.');
                console.error(error);
            } finally {
                loadingIndicator.classList.add('hidden');
                chatWindow.scrollTo({ top: chatWindow.scrollHeight, behavior: 'smooth' });
            }
        }

        async function generateText(prompt) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            
            const response = await fetchWithRetry(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }],
                    systemInstruction: { parts: [{ text: "You are ScholarBot, a helpful academic assistant. Keep answers clear, professional, and well-formatted. Use bullet points for complex topics." }] }
                })
            });

            const data = await response.json();
            const text = data.candidates?.[0]?.content?.parts?.[0]?.text || "I couldn't generate a response.";
            appendMessage('bot', text);
        }

        async function generateImage(prompt) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`;
            
            const response = await fetchWithRetry(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    instances: { prompt: prompt },
                    parameters: { sampleCount: 1 }
                })
            });

            const data = await response.json();
            const b64 = data.predictions?.[0]?.bytesBase64Encoded;
            
            if (b64) {
                const imgUrl = `data:image/png;base64,${b64}`;
                appendMessage('bot', `Generated image for: "${prompt}"`, imgUrl);
            } else {
                appendMessage('bot', "I couldn't generate that image. It might have triggered safety filters or been too complex.");
            }
        }

        async function fetchWithRetry(url, options, retries = 5) {
            for (let i = 0; i < retries; i++) {
                try {
                    const res = await fetch(url, options);
                    if (res.ok) return res;
                    if (res.status !== 429 && res.status < 500) break;
                } catch (e) {}
                await new Promise(resolve => setTimeout(resolve, Math.pow(2, i) * 1000));
            }
            throw new Error('Max retries reached');
        }

        function appendMessage(role, text, imageUrl = null) {
            const wrapper = document.createElement('div');
            wrapper.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'}`;
            
            let contentHtml = `
                <div class="message-bubble px-4 py-3 rounded-2xl shadow-sm ${
                    role === 'user' 
                    ? 'bg-blue-600 text-white rounded-tr-none' 
                    : 'bg-white text-slate-800 border border-slate-100 rounded-tl-none'
                }">
                    <div class="text-sm whitespace-pre-wrap">${formatText(text)}</div>
            `;

            if (imageUrl) {
                contentHtml += `
                    <div class="mt-3 overflow-hidden rounded-lg border border-slate-100 bg-slate-50">
                        <img src="${imageUrl}" class="w-full h-auto object-cover min-h-[100px]" alt="AI Generated" 
                             onerror="this.parentElement.innerHTML='<p class=\"p-4 text-xs text-red-400\">Image failed to load</p>'">
                    </div>
                `;
            }

            contentHtml += `</div>`;
            wrapper.innerHTML = contentHtml;
            messageList.appendChild(wrapper);
            chatWindow.scrollTo({ top: chatWindow.scrollHeight, behavior: 'smooth' });
        }

        function formatText(text) {
            // Simple markdown parsing
            return text
                .replace(/\*\*(.*?)\*\*/g, '<strong class="font-bold text-blue-800">$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/`(.*?)`/g, '<code class="bg-slate-100 px-1.5 py-0.5 rounded text-pink-600 text-[0.9em]">$1</code>');
        }

        // Handle Enter key for sending
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSendMessage();
            }
        });
    </script>
</body>
</html>

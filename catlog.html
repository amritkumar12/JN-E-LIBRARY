<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Library Catalog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .glass-card:hover {
            transform: translateY(-5px);
            border-color: #3b82f6;
            box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.2);
        }
        .book-img {
            aspect-ratio: 2/3;
            object-fit: cover;
            border-radius: 12px;
        }
        #notification {
            display: none;
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- Notification -->
    <div id="notification" class="bg-blue-600 text-white px-6 py-3 rounded-full shadow-2xl font-semibold animate-bounce">
        Processing Borrow Request...
    </div>

    <!-- Header Area -->
    <header class="max-w-7xl mx-auto flex items-center justify-between mb-12">
       <a href="index.html"><button class="flex items-center gap-2 text-slate-400 hover:text-white transition-colors font-semibold py-2 px-4 rounded-lg bg-slate-800/50 border border-slate-700">
            <i data-lucide="arrow-left" class="w-5 h-5"></i>
            Back to Home
        </button> </a> 
        
        <h1 class="text-2xl md:text-3xl font-bold bg-gradient-to-r from-blue-400 to-indigo-400 bg-clip-text text-transparent">
            Digital Archive
        </h1>
        
        <div class="hidden md:flex items-center gap-4">
            <div class="bg-slate-800 p-2 rounded-full px-4 text-xs font-bold text-blue-400 border border-blue-500/20">
                1,240+ BOOKS AVAILABLE
            </div>
        </div>
    </header>

    <!-- Catalog Grid -->
    <main class="max-w-7xl mx-auto">
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            
            <!-- Book 1 -->
            <div class="glass-card p-4 rounded-2xl flex flex-col">
                <img src="https://images.unsplash.com/photo-1544947950-fa07a98d237f?q=80&w=400" alt="Book Cover" class="book-img mb-4 shadow-lg">
                <div class="flex-1">
                    <h3 class="font-bold text-lg leading-tight mb-1">Principles of Physics</h3>
                    <p class="text-slate-400 text-sm mb-4 italic">Dr. J. Walker</p>
                    <div class="flex flex-wrap gap-2 mb-4">
                        <span class="text-[10px] bg-blue-500/10 text-blue-400 px-2 py-1 rounded border border-blue-500/20 font-bold uppercase">Science</span>
                    </div>
                </div>
                <button onclick="handleBorrow('Principles of Physics')" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-xl transition-colors flex items-center justify-center gap-2 active:scale-95">
                    <i data-lucide="bookmark-plus" class="w-4 h-4"></i>
                    Borrow Now
                </button>
            </div>

             <!-- Book 2 -->
            <div class="glass-card p-4 rounded-2xl flex flex-col">
                <img src="https://images.unsplash.com/photo-1532012197267-da84d127e765?q=80&w=400" alt="Book Cover" class="book-img mb-4 shadow-lg">
                <div class="flex-1">
                    <h3 class="font-bold text-lg leading-tight mb-1">Algorithms Unlocked</h3>
                    <p class="text-slate-400 text-sm mb-4 italic">Thomas H. Cormen</p>
                    <div class="flex flex-wrap gap-2 mb-4">
                        <span class="text-[10px] bg-emerald-500/10 text-emerald-400 px-2 py-1 rounded border border-emerald-500/20 font-bold uppercase">Computing</span>
                    </div>
                </div>
                <button onclick="handleBorrow('Algorithms Unlocked')" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-xl transition-colors flex items-center justify-center gap-2 active:scale-95">
                    <i data-lucide="bookmark-plus" class="w-4 h-4"></i>
                    Borrow Now
                </button>
            </div>
            
            <!-- Book 3 -->
            <div class="glass-card p-4 rounded-2xl flex flex-col">
                <img src="https://images.unsplash.com/photo-1516979187457-637abb4f9353?q=80&w=400" alt="Book Cover" class="book-img mb-4 shadow-lg">
                <div class="flex-1">
                    <h3 class="font-bold text-lg leading-tight mb-1">History of Nations</h3>
                    <p class="text-slate-400 text-sm mb-4 italic">Prof. Robert H.</p>
                    <div class="flex flex-wrap gap-2 mb-4">
                        <span class="text-[10px] bg-amber-500/10 text-amber-400 px-2 py-1 rounded border border-amber-500/20 font-bold uppercase">History</span>
                    </div>
                </div>
                <button onclick="handleBorrow('History of Nations')" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-xl transition-colors flex items-center justify-center gap-2 active:scale-95">
                    <i data-lucide="bookmark-plus" class="w-4 h-4"></i>
                    Borrow Now
                </button>
            </div>

            <!-- Book 4 -->
            <div class="glass-card p-4 rounded-2xl flex flex-col">
                <img src="https://images.unsplash.com/photo-1532012197267-da84d127e765?q=80&w=400" alt="Book Cover" class="book-img mb-4 shadow-lg">
                <div class="flex-1">
                    <h3 class="font-bold text-lg leading-tight mb-1">Algorithms Unlocked</h3>
                    <p class="text-slate-400 text-sm mb-4 italic">Thomas H. Cormen</p>
                    <div class="flex flex-wrap gap-2 mb-4">
                        <span class="text-[10px] bg-emerald-500/10 text-emerald-400 px-2 py-1 rounded border border-emerald-500/20 font-bold uppercase">Computing</span>
                    </div>
                </div>
                <button onclick="handleBorrow('Algorithms Unlocked')" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-xl transition-colors flex items-center justify-center gap-2 active:scale-95">
                    <i data-lucide="bookmark-plus" class="w-4 h-4"></i>
                    Borrow Now
                </button>
            </div>

        </div>
       <p class="mt-6 text-xs text-slate-500 hover:text-white w-full text-center transition-colors">More Books to be added by Authority</p>
                
    </main>

    <script>
        // Initialize Icons
        lucide.createIcons();

        // Handle Borrow Button
        function handleBorrow(bookTitle) {
            const notif = document.getElementById('notification');
            notif.innerText = `Borrowing: ${bookTitle}...`;
            notif.style.display = 'block';
            
            setTimeout(() => {
                notif.innerText = `Success! ${bookTitle} added to your account.`;
                setTimeout(() => {
                    notif.style.display = 'none';
                }, 2000);
            }, 1000);
        }
    </script>
</body>
</html>
